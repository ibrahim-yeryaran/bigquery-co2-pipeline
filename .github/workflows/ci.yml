name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Note: the live load/transform needs Google Cloud credentials, so CI runs
# lint + a syntax/compile check rather than executing against BigQuery.
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt ruff

      - name: Lint with ruff
        run: ruff check .

      - name: Compile check
        run: python -m py_compile extract_load/load_to_bigquery.py transform/run_transformations.py
